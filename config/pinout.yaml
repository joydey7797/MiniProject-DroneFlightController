# Pinout configuration of the STM32H743ZIT6 MCU
# This file maps the various peripherals to their corresponding GPIO pins.

# Typycal descripton structure:
# stm32<MCU_MODEL>:
#   <PERIPHERAL_NAME>:  # <PERIPHERAL_DESCRIPTION>
#     <SIGNAL_NAME>: <PIN_NAME> (<PIN_COMMENT>)
#     ... 



stm32h743ZIT6:
  uart4:  #Telemetry
    tx:  PA0
    rx:  PA1
    cts: PB0
    rts: PB14

  uart5:  #Mini Pad Out UART
    tx: PB13
    rx: PB12

  uart8:    #GPS
    tx: PE1
    rx: PE0

  usart2:   #Pad Out USART
    tx: PA2
    rx: PA3

  usart6:   #RC Receiver
    tx: PC6
    rx: PC7

  spi4:   #Magnometer
    sck:  PE2
    miso: PE5
    mosi: PE6

  spi5:   #IMU
    sck:  PF7
    miso: PF8
    mosi: PF9

  i2c1:   #I2C Connector (ex: External Compass)
    sda: PB7
    scl: PB6

  i2c2:   #Barometer
    sda: PF0
    scl: PF1

  i2c4:    #Pad Out I2C
    sda: PF15
    scl: PF14

  fdcan1:   #GPS CAN Bus
    rx: PD0
    tx: PB9

  adc1:   #Battery Voltage/Current Sensor
    inp2: PF11   # ADC1_INP2 Voltage Sensor
    inp3: PA6    # ADCx_INP3 Current Sensor

  adc2:   #Pad Out ADCs 
    inp2: PF13   # ADC2_INP2
    inp4: PC4    # ADCx_INP4
    inp5: PB1    # ADCx_INP5

  tim1:  #Motors ESC PWM/DShot
    ch1: PE9    # S_TIM1_CH1 (PWM)
    ch2: PE11   # S_TIM1_CH2 (PWM)
    ch3: PE13   # S_TIM1_CH3 (PWM)
    ch4: PE14   # S_TIM1_CH4 (PWM)

  tim4:   #RGB LED
    ch1: PD12   # S_TIM4_CH1 (PWM) Red Channel
    ch2: PD13   # S_TIM4_CH2 (PWM) Green Channel
    ch3: PD14   # S_TIM4_CH3 (PWM) Blue Channel

  sdmmc1:   #SD Card
    d0:  PC8
    d1:  PC9
    d2:  PC10
    d3:  PC11
    ck:  PC12
    cmd: PD2
    cds: PD3  # Card Detect Switch

  usb_otg_fs:   #USB-C
    dm:   PA11
    dp:   PA12
    vbus: PA9

  sys_led:    #System Status LED
    pin: PD6

  ext_switch:   #External System Switch
    pin: PE3

  pwr_good:     #Power Good Signal (Buck 3V3 rail)
    pin: PD9

  buzzer:    #External Active Buzzer
    pin: PC3_C

  external_gpios:   #Pad Out GPIOs
    pin1: PE15  #GPIO_68
    pin2: PB10  #GPIO_69
    pin3: PB11  #GPIO_70

  debug:    #SWD Programming/Debugging Tag Conector
    swdio: "PA13 (JTMS/SWDIO)"
    swclk: "PA14 (JTCK/SWCLK)"
    swo:   "PB3 (JTDO/TRACESWO)"

  hse:    #Crystal Oscillator
    osc_in:  "PH0-OSC_IN (PH0)"
    osc_out: "PH1-OSC_OUT (PH1)"

  system:
    systick:    VP_SYS_VS_Systick
    memorymap:  VP_MEMORYMAP_VS_MEMORYMAP
    tim1_clock: VP_TIM1_VS_ClockSourceINT
    tim4_clock: VP_TIM4_VS_ClockSourceINT